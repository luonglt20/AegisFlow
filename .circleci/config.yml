version: 2.1

executors:
  aegisflow-python-node:
    docker:
      - image: cimg/python:3.11-node
    working_directory: ~/project
    environment:
      PYTHONUNBUFFERED: "1"
      SCAN_TARGET: /home/circleci/project/real-apps/NodeGoat
      BUILD_USER: circleci
      STRICT_CI: "false"

commands:
  prepare-results:
    steps:
      - run:
          name: Prepare artifact directories
          command: |
            mkdir -p security-results dashboard/data ingest .circleci/tmp

  install-security-tools:
    steps:
      - restore_cache:
          keys:
            - aegisflow-pip-v1-{{ arch }}-{{ checksum "package-lock.json" }}
            - aegisflow-pip-v1-{{ arch }}
      - run:
          name: Install OS packages
          command: |
            sudo apt-get update
            sudo apt-get install -y golang
      - run:
          name: Install Python scanners
          command: |
            python3 -m pip install --user --no-cache-dir semgrep checkov requests
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
      - run:
          name: Install Trivy, Gitleaks, Syft, Nuclei
          command: |
            . "$BASH_ENV"
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b "$HOME/.local/bin"
            curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz -C "$HOME/.local/bin" gitleaks
            curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b "$HOME/.local/bin"
            go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
            mkdir -p "$HOME/.local/bin"
            ln -sf "$HOME/go/bin/nuclei" "$HOME/.local/bin/nuclei"
      - save_cache:
          key: aegisflow-pip-v1-{{ arch }}-{{ checksum "package-lock.json" }}
          paths:
            - ~/.cache/pip
            - ~/.local/bin
            - ~/go/pkg/mod

jobs:
  build:
    executor: aegisflow-python-node
    environment:
      PIPELINE_ID: "circleci-build-<< pipeline.number >>"
    steps:
      - checkout
      - prepare-results
      - run:
          name: Run build stage
          command: python3 pipeline/build_target.py
      - persist_to_workspace:
          root: .
          paths:
            - security-results/build_report.json
      - store_artifacts:
          path: security-results/build_report.json

  test:
    executor: aegisflow-python-node
    environment:
      PIPELINE_ID: "circleci-test-<< pipeline.number >>"
    steps:
      - checkout
      - attach_workspace:
          at: ~/project
      - prepare-results
      - run:
          name: Run test stage
          command: python3 pipeline/test_target.py
      - persist_to_workspace:
          root: .
          paths:
            - security-results/build_report.json
            - security-results/test_report.json
      - store_artifacts:
          path: security-results/test_report.json

  security:
    executor: aegisflow-python-node
    environment:
      PIPELINE_ID: "circleci-security-<< pipeline.number >>"
    steps:
      - checkout
      - attach_workspace:
          at: ~/project
      - prepare-results
      - install-security-tools
      - run:
          name: Run integrated security pipeline
          command: |
            . "$BASH_ENV"
            set +e
            bash pipeline/run_pipeline.sh
            PIPELINE_EXIT=$?
            echo "$PIPELINE_EXIT" > security-results/policy_exit_code.txt
            echo "Integrated pipeline exit code: $PIPELINE_EXIT"
            exit 0
      - persist_to_workspace:
          root: .
          paths:
            - security-results
            - dashboard/data
      - store_artifacts:
          path: security-results
      - store_artifacts:
          path: dashboard/data

  report:
    executor: aegisflow-python-node
    environment:
      PIPELINE_ID: "circleci-report-<< pipeline.number >>"
    steps:
      - checkout
      - attach_workspace:
          at: ~/project
      - run:
          name: Refresh case study HTML report
          command: python3 pipeline/generate_report.py
      - persist_to_workspace:
          root: .
          paths:
            - DevSecOps_CaseStudy_Report.html
            - security-results
      - store_artifacts:
          path: DevSecOps_CaseStudy_Report.html

  policy_gate:
    executor: aegisflow-python-node
    environment:
      PIPELINE_ID: "circleci-policy-<< pipeline.number >>"
    steps:
      - checkout
      - attach_workspace:
          at: ~/project
      - run:
          name: Enforce final security decision
          command: |
            python3 - <<'PY'
            import json
            from pathlib import Path
            import sys

            result_path = Path("security-results/policy_result.json")
            exit_code_path = Path("security-results/policy_exit_code.txt")

            if not result_path.exists():
                print("policy_result.json is missing; failing gate.")
                sys.exit(1)

            result = json.loads(result_path.read_text(encoding="utf-8"))
            status = result.get("pipeline_status", "UNKNOWN")
            reason = result.get("block_reason", "No reason recorded.")
            counts = result.get("findings_summary", {})

            print(f"Policy status: {status}")
            print(f"Reason: {reason}")
            print(f"Findings summary: {counts}")

            exit_code = 0
            if exit_code_path.exists():
                try:
                    exit_code = int(exit_code_path.read_text(encoding="utf-8").strip())
                except ValueError:
                    exit_code = 1

            sys.exit(exit_code)
            PY

workflows:
  version: 2
  aegisflow-devsecops:
    jobs:
      - build
      - test:
          requires:
            - build
      - security:
          requires:
            - test
      - report:
          requires:
            - security
      - policy_gate:
          requires:
            - report

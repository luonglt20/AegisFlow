services:
  aegisflow:
    build: .
    container_name: aegisflow-core
    ports:
      - "58081:58081"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - SCAN_TARGET=${SCAN_TARGET:-}
      - TARGET_URL=${TARGET_URL:-}
      - BUILD_USER=${BUILD_USER:-local-operator}
    volumes:
      - .:/app
      - ./real-apps:/app/workspace
    networks:
      - aegis-net

  juice-shop:
    image: bkimminich/juice-shop
    container_name: juice-shop
    ports:
      - "3000:3000"
    networks:
      - aegis-net

networks:
  aegis-net:
    driver: bridge

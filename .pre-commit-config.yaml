# AegisFlow - Pre-commit Configuration (2026 Modernized)
# ─────────────────────────────────────────────────────────────
# Thêm file này vào dự án để tự động quét Secret mỗi khi commit.

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
      - id: check-added-large-files
      - id: end-of-file-fixer
      - id: trailing-whitespace

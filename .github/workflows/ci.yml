name: AegisFlow CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  devsecops:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      SCAN_TARGET: ${{ github.workspace }}/real-apps/NodeGoat
      BUILD_USER: github-actions
      STRICT_CI: "false"
      PIPELINE_ID: gh-${{ github.run_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Prepare directories
        run: mkdir -p security-results dashboard/data ingest "$HOME/.local/bin"

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --user --no-cache-dir semgrep checkov requests
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install security tools
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b "$HOME/.local/bin"
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz -C "$HOME/.local/bin" gitleaks
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b "$HOME/.local/bin"
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          ln -sf "$HOME/go/bin/nuclei" "$HOME/.local/bin/nuclei"

      - name: Build stage
        run: python3 pipeline/build_target.py

      - name: Test stage
        run: python3 pipeline/test_target.py

      - name: Security pipeline
        run: |
          set +e
          bash pipeline/run_pipeline.sh
          PIPELINE_EXIT=$?
          echo "PIPELINE_EXIT=$PIPELINE_EXIT" >> "$GITHUB_ENV"
          echo "$PIPELINE_EXIT" > security-results/policy_exit_code.txt
          exit 0

      - name: Refresh report
        run: python3 pipeline/generate_report.py

      - name: Print policy summary
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("security-results/policy_result.json")
          if not path.exists():
              print("No policy_result.json generated.")
          else:
              data = json.loads(path.read_text(encoding="utf-8"))
              print("Pipeline status:", data.get("pipeline_status"))
              print("Reason:", data.get("block_reason"))
              print("Findings summary:", data.get("findings_summary"))
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aegisflow-results
          path: |
            security-results
            dashboard/data
            DevSecOps_CaseStudy_Report.html
          if-no-files-found: warn

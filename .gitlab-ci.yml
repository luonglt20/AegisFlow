stages:
  - build
  - test
  - security
  - report

variables:
  PYTHONUNBUFFERED: "1"
  DOCKER_DRIVER: overlay2

build_app:
  stage: build
  image: python:3.11-slim
  script:
    - python3 pipeline/build_target.py
  artifacts:
    when: always
    paths:
      - security-results/build_report.json

test_app:
  stage: test
  image: python:3.11-slim
  script:
    - python3 pipeline/test_target.py
  artifacts:
    when: always
    paths:
      - security-results/test_report.json

security_scan:
  stage: security
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y curl git wget unzip nodejs npm golang
    - pip install --no-cache-dir semgrep checkov requests
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz -C /usr/local/bin gitleaks
    - curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
    - go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
    - ln -s /root/go/bin/nuclei /usr/local/bin/nuclei
  script:
    - bash pipeline/run_pipeline.sh
  artifacts:
    when: always
    paths:
      - security-results/
      - dashboard/data/

report_case_study:
  stage: report
  image: python:3.11-slim
  script:
    - python3 pipeline/generate_report.py
  artifacts:
    when: always
    paths:
      - DevSecOps_CaseStudy_Report.html
